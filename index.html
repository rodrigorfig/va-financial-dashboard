<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Vaca Argentina</title>

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Vaca Argentina">
<link rel="apple-touch-icon" href="icon-192.png">

<style>
body{
font-family: system-ui;
margin:20px;
background:#121212;
color:white;
}
.card{
background:#1f1f1f;
padding:20px;
border-radius:10px;
margin-bottom:15px;
}
.value{
font-size:28px;
font-weight:bold;
}
</style>

<link rel="apple-touch-startup-image" href="splash-828x1792.png">
  
</head>

<body>

<h2>Finance Dashboard</h2>

<div class="card">
Receitas
<div class="value" id="receitas">Loading...</div>
</div>

<div class="card">
Despesas
<div class="value" id="despesas">Loading...</div>
</div>

<div class="card">
Lucro
<div class="value" id="lucro">Loading...</div>
</div>


<script>
const API = "https://script.google.com/macros/s/AKfycbyPCFg6d1apnT3w9ujlA5oKzR4td9IsGQQYtIbyw7IJbj7zWcnZMAJAgUt7rMuRwtvj/exec";

function updateDashboard(data) {
  document.getElementById("receitas").innerText = data.currentMonth.receitas.toFixed(2);
  document.getElementById("despesas").innerText = data.currentMonth.despesas.toFixed(2);
  document.getElementById("lucro").innerText = data.currentMonth.lucro.toFixed(2);
  
  // Save last fetched data
  localStorage.setItem("lastData", JSON.stringify(data.currentMonth));
}

// Load last cached data if available
const cached = localStorage.getItem("lastData");
if (cached) {
  const data = { currentMonth: JSON.parse(cached) };
  updateDashboard(data);
}

fetch(API)
  .then(r => r.json())
  .then(data => {
    updateDashboard(data);
  })
  .catch(err => {
    console.warn("Failed to fetch new data, showing cached values if any.");
    if (!cached) {
      document.body.innerHTML = "Login required. Open the dashboard once in browser.";
    }
  });
</script>
  

</body>
</html>
